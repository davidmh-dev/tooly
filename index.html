        const list = document.getElementById('autocomplete-list');

        // 2. FUNCIÓN PARA PINTAR LAS TARJETAS DINÁMICAMENTE
        function renderCards(dataArray) {
            // Limpiamos el grid
            grid.innerHTML = '';

            // Si no hay resultados, mostramos un mensaje
            if (dataArray.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column: 1 / -1; color: #ef4444;">No tools found matching your search.</p>';
                return;
            }

            // Iteramos y creamos el HTML de cada tarjeta
            dataArray.forEach(t => {
                const cardHTML = `
                <a href="tools/${t.url}" class="card" data-title="${t.title}">
                    <img src="${t.img}" alt="${t.alt}">
                    <div class="card-content">
                        <div class="card-title">${t.title}</div>
                        <p class="card-desc">${t.desc}</p>
                    </div>
                </a>
            `;
                grid.innerHTML += cardHTML;
            });
        }

        // Inicializamos pintando TODAS las tarjetas
        renderCards(tools);

        // 3. NUEVA LÓGICA DEL BUSCADOR (Filtra el array y vuelve a pintar)
        searchBar.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            list.innerHTML = '';

            // Autocompletado del buscador
            if (val) {
                const filteredTitles = tools.filter(t => t.title.toLowerCase().includes(val));
                filteredTitles.forEach(t => {
                    const div = document.createElement('div');
                    div.innerHTML = t.title;
                    div.className = 'autocomplete-item';
                    div.onclick = () => { window.location.href = t.url; };
                    list.appendChild(div);
                });
            }

            // Filtramos el array principal buscando en el título o en la descripción
            const filteredCards = tools.filter(t => {
                return t.title.toLowerCase().includes(val) || t.desc.toLowerCase().includes(val);
            });

            // Volvemos a pintar solo las tarjetas que coinciden
            renderCards(filteredCards);
        });

        // Cerrar la lista de autocompletado si haces clic fuera
        document.addEventListener('click', (e) => {
            if (e.target !== searchBar) list.innerHTML = '';
        });
