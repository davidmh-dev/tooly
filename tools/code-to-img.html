<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - Code to Image</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #c084fc;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        #capture {
            background: linear-gradient(45deg, #6366f1, #a855f7);
            padding: 40px;
            border-radius: 12px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }

        #window {
            background: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            padding: 20px;
        }

        .dots {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #d4d4d4;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            outline: none;
            resize: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent);">Code Snippet Beautifier</h1>
        <div id="capture">
            <div id="window">
                <div class="dots">
                    <div class="dot" style="background:#ff5f56"></div>
                    <div class="dot" style="background:#ffbd2e"></div>
                    <div class="dot" style="background:#27c93f"></div>
                </div>
                <textarea id="code"
                    rows="10">function helloWorld() {&#10;  console.log("Hello Tooly!");&#10;}</textarea>
            </div>
        </div>
        <p style="color:#94a3b8; font-size:0.8rem; margin-top:10px;">Use a screenshot tool to save your snippet!</p>
    </div>
</body>

</html>
