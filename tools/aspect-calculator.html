<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - Aspect Calculator</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #f87171;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            color: white;
            border: 1px solid var(--border);
            font-size: 1.2rem;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }

        input:focus {
            border-color: var(--accent);
        }

        .result-box {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            margin-top: 30px;
        }

        .ratio-text {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent); text-align:center; margin-top: 0;">Aspect Ratio Calculator</h1>
        <p style="text-align:center; color:#94a3b8;">Enter dimensions to find the exact ratio</p>
        <div class="grid">
            <div><label style="font-weight:bold;">Width (px)</label><input type="number" id="w" value="1920"
                    oninput="updateRatio()"></div>
            <div><label style="font-weight:bold;">Height (px)</label><input type="number" id="h" value="1080"
                    oninput="updateRatio()"></div>
        </div>
        <div class="result-box">
            <div style="font-weight:bold; color:#cbd5e1; margin-bottom:10px;">Calculated Aspect Ratio</div>
            <div class="ratio-text" id="res">16:9</div>
        </div>
    </div>
    <script>
        function gcd(a, b) { return b ? gcd(b, a % b) : a; }
        function updateRatio() {
            const w = parseInt(document.getElementById('w').value) || 0;
            const h = parseInt(document.getElementById('h').value) || 0;
            if (w === 0 || h === 0) {
                document.getElementById('res').innerText = "0:0";
                return;
            }
            const common = gcd(w, h);
            document.getElementById('res').innerText = `${w / common}:${h / common}`;
        }
        updateRatio();
    </script>
</body>

</html>
