<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - JWT Inspector</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #000;
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 10px;
            font-family: monospace;
            box-sizing: border-box;
            border-radius: 6px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        pre {
            background: #000;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            overflow-x: auto;
            border: 1px solid var(--border);
            color: #10b981;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent); text-align:center; margin-top: 0;">JWT Inspector</h1>
        <label style="font-weight:bold; margin-bottom: 5px; display:block;">Paste your JWT Token</label>
        <textarea id="token" oninput="decodeJWT()" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
        <div class="grid">
            <div><label style="font-weight:bold;">Header</label>
                <pre id="header">{}</pre>
            </div>
            <div><label style="font-weight:bold;">Payload</label>
                <pre id="payload">{}</pre>
            </div>
        </div>
    </div>
    <script>
        function decodeJWT() {
            const token = document.getElementById('token').value.split('.');
            if (token.length < 2) return;
            try {
                const h = JSON.parse(atob(token[0]));
                const p = JSON.parse(atob(token[1]));
                document.getElementById('header').innerText = JSON.stringify(h, null, 2);
                document.getElementById('payload').innerText = JSON.stringify(p, null, 2);
            } catch (e) {
                document.getElementById('header').innerText = "Invalid JWT";
                document.getElementById('payload').innerText = "Invalid JWT";
            }
        }
    </script>
</body>

</html>
