<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - Keycode Finder</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #60a5fa;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            flex-direction: column;
        }

        .box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 50px;
            text-align: center;
            min-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .big {
            font-size: 7rem;
            font-weight: bold;
            color: var(--accent);
            margin: 20px 0;
            font-family: monospace;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .data-box {
            background: #000;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .data-label {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .data-val {
            font-family: monospace;
            color: #10b981;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2 style="margin-top:0;">Press any key</h2>
        <div class="big" id="code">...</div>
        <div class="grid">
            <div class="data-box">
                <div class="data-label">event.key</div>
                <div class="data-val" id="key">-</div>
            </div>
            <div class="data-box">
                <div class="data-label">event.code</div>
                <div class="data-val" id="detail">-</div>
            </div>
        </div>
    </div>
    <script>
        window.addEventListener('keydown', e => {
            e.preventDefault(); // Prevent scrolling when pressing space/arrows
            document.getElementById('code').innerText = e.keyCode;
            document.getElementById('key').innerText = e.key === ' ' ? '(Space)' : e.key;
            document.getElementById('detail').innerText = e.code;
        });
    </script>
</body>

</html>
