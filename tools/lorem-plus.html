<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - Lorem Ipsum Plus</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        select,
        input {
            padding: 10px;
            background: #000;
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-right: 10px;
        }

        button {
            padding: 10px 20px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 250px;
            margin-top: 20px;
            background: #000;
            color: #cbd5e1;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-family: serif;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent); margin-top:0;">Lorem Ipsum Plus</h1>
        <input type="number" id="count" value="3" min="1" style="width: 60px;">
        <select id="type">
            <option value="paras">Paragraphs</option>
            <option value="words">Words</option>
            <option value="list">List Items</option>
        </select>
        <button onclick="generate()">Generate</button>
        <textarea id="out" readonly></textarea>
    </div>
    <script>
        function generate() {
            const type = document.getElementById('type').value;
            const count = document.getElementById('count').value;
            const text = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. ";
            let res = "";
            if (type === 'paras') res = Array(parseInt(count)).fill(text).join('\n\n');
            if (type === 'words') res = text.split(' ').slice(0, count).join(' ');
            if (type === 'list') res = Array(parseInt(count)).fill(0).map(() => `• ${text.split(' ').slice(0, 5).join(' ')}`).join('\n');
            document.getElementById('out').value = res;
        }
    </script>
</body>

</html>
