<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - CSV to JSON</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #2dd4bf;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        textarea {
            width: 100%;
            height: 350px;
            background: #000;
            color: #2dd4bf;
            border: 1px solid var(--border);
            padding: 10px;
            font-family: monospace;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: var(--accent);
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent); text-align:center;">CSV to JSON Converter</h1>
        <div class="grid">
            <div><label>CSV Input (Comma separated)</label><textarea id="csv"
                    placeholder="name,age,city&#10;John,30,New York"></textarea></div>
            <div><label>JSON Output</label><textarea id="json" readonly></textarea></div>
        </div>
        <button onclick="convert()">Convert Data</button>
    </div>
    <script>
        function convert() {
            const csv = document.getElementById('csv').value;
            const lines = csv.split('\n').filter(l => l.trim());
            const headers = lines[0].split(',');
            const result = lines.slice(1).map(line => {
                const data = line.split(',');
                return headers.reduce((obj, header, i) => {
                    obj[header.trim()] = data[i]?.trim();
                    return obj;
                }, {});
            });
            document.getElementById('json').value = JSON.stringify(result, null, 4);
        }
    </script>
</body>

</html>
