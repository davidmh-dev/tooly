<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooly - Ultimate SEO & Schema Generator</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #8b5cf6;
            --border: #334155;
            --error: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--accent);
            text-align: center;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        /* TABS LOGIC */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #94a3b8;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #cbd5e1;
        }

        .counter {
            font-weight: normal;
            color: #94a3b8;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent);
        }

        .section-divider {
            margin: 25px 0 10px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.main-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 30px;
        }

        button.main-btn:hover {
            background: #7c3aed;
            transform: translateY(-2px);
        }

        #result-container {
            margin-top: 30px;
            display: none;
        }

        pre {
            background: #000;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            overflow-x: auto;
            font-size: 0.85rem;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .copy-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 Tooly Pro SEO Generator</h1>
        <p class="subtitle">Full-stack Meta Tags & Deep JSON-LD Automation</p>
        <p class="subtitle">Go through all the steps to optimize your website for search engines</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'basic')">1. Basic SEO</button>
            <button class="tab-btn" onclick="openTab(event, 'advanced')">2. Advanced & Social</button>
            <button class="tab-btn" onclick="openTab(event, 'schema')">3. Deep Schema</button>
        </div>

        <div id="basic" class="tab-content active">
            <div class="grid">
                <div class="full-width">
                    <label>Page Title <span id="title-count" class="counter">0/60</span></label>
                    <input type="text" id="seo-title" placeholder="Tooly | Instant Static Web Tools"
                        oninput="updateCounts()">
                </div>
                <div class="full-width">
                    <label>Meta Description <span id="desc-count" class="counter">0/160</span></label>
                    <textarea id="seo-desc" rows="3" placeholder="Describe your page for search engines..."
                        oninput="updateCounts()"></textarea>
                </div>
                <div>
                    <label>Canonical URL</label>
                    <input type="url" id="seo-url" placeholder="https://tooly.dev/tool-name">
                </div>
                <div>
                    <label>Target Language</label>
                    <select id="seo-lang">
                        <option value="en">English (en)</option>
                        <option value="es">Spanish (es)</option>
                        <option value="fr">French (fr)</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="advanced" class="tab-content">
            <div class="grid">
                <div>
                    <label>Search Engine Robots</label>
                    <select id="seo-robots">
                        <option value="index, follow">Index & Follow (Default)</option>
                        <option value="noindex, nofollow">No-Index & No-Follow (Private)</option>
                    </select>
                </div>
                <div>
                    <label>Brand Theme Color</label>
                    <input type="color" id="seo-theme" value="#8b5cf6">
                </div>
                <div class="full-width">
                    <label>Open Graph Image URL (1200x630px recommended)</label>
                    <input type="url" id="seo-image" placeholder="https://tooly.dev/og-image.jpg">
                </div>
                <div>
                    <label>Twitter Handle</label>
                    <input type="text" id="seo-twitter" placeholder="@YourUser">
                </div>
                <div>
                    <label>Author / Publisher</label>
                    <input type="text" id="seo-author" placeholder="Tooly Team">
                </div>
            </div>
        </div>

        <div id="schema" class="tab-content">
            <div class="grid">
                <div class="full-width">
                    <label>Schema Type</label>
                    <select id="seo-type" onchange="toggleSchemaFields()">
                        <option value="SoftwareApplication">Software Application (Tools/Apps)</option>
                        <option value="Article">Article / Blog Post</option>
                        <option value="Product">Product / Service</option>
                        <option value="FAQPage">FAQ Page (Maximize SERP space)</option>
                    </select>
                </div>

                <div id="fields-software" class="full-width grid">
                    <div><label>OS Soportado</label><input type="text" id="soft-os"
                            value="Windows, macOS, Linux, Android, iOS"></div>
                    <div><label>Category</label><input type="text" id="soft-cat" value="UtilitiesApplication"></div>
                </div>

                <div id="fields-product" class="full-width grid" style="display:none">
                    <div><label>Price</label><input type="number" id="prod-price" value="0"></div>
                    <div><label>Currency</label><input type="text" id="prod-curr" value="USD"></div>
                    <div><label>Rating (1-5)</label><input type="number" id="prod-rate" value="5" step="0.1"></div>
                </div>

                <div id="fields-faq" class="full-width" style="display:none">
                    <div class="section-divider">Question 1</div>
                    <input type="text" id="faq-q1" placeholder="Question text">
                    <textarea id="faq-a1" rows="2" placeholder="Answer text" style="margin-top:5px"></textarea>
                    <div class="section-divider">Question 2</div>
                    <input type="text" id="faq-q2" placeholder="Question text">
                    <textarea id="faq-a2" rows="2" placeholder="Answer text" style="margin-top:5px"></textarea>
                </div>
            </div>
        </div>

        <button class="main-btn" onclick="generateAll()">Generate Pro SEO Code</button>

        <div id="result-container">
            <pre id="output"></pre>
            <button class="copy-btn" onclick="copyToClipboard()">📋 Copy Full Configuration</button>
        </div>
    </div>

    <script>
        function openTab(evt, tabName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function toggleSchemaFields() {
            const type = document.getElementById('seo-type').value;
            document.getElementById('fields-software').style.display = type === 'SoftwareApplication' ? 'grid' : 'none';
            document.getElementById('fields-product').style.display = type === 'Product' ? 'grid' : 'none';
            document.getElementById('fields-faq').style.display = type === 'FAQPage' ? 'block' : 'none';
        }

        function updateCounts() {
            const t = document.getElementById('seo-title').value.length;
            const d = document.getElementById('seo-desc').value.length;
            document.getElementById('title-count').textContent = t + "/60";
            document.getElementById('title-count').style.color = t > 60 ? 'var(--error)' : (t > 45 ? 'var(--success)' : '#94a3b8');
            document.getElementById('desc-count').textContent = d + "/160";
            document.getElementById('desc-count').style.color = d > 160 ? 'var(--error)' : (d > 130 ? 'var(--success)' : '#94a3b8');
        }

        function generateAll() {
            const v = (id) => document.getElementById(id).value;
            const type = v('seo-type');

            let schema = {
                "@context": "https://schema.org",
                "@type": type,
                "name": v('seo-title'),
                "description": v('seo-desc'),
                "url": v('seo-url')
            };

            // Deep Schema Logic
            if (type === 'SoftwareApplication') {
                schema.operatingSystem = v('soft-os');
                schema.applicationCategory = v('soft-cat');
                schema.offers = { "@type": "Offer", "price": "0", "priceCurrency": "USD" };
            } else if (type === 'Product') {
                schema.offers = { "@type": "Offer", "price": v('prod-price'), "priceCurrency": v('prod-curr') };
                schema.aggregateRating = { "@type": "AggregateRating", "ratingValue": v('prod-rate'), "reviewCount": "85" };
            } else if (type === 'FAQPage') {
                schema.mainEntity = [
                    { "@type": "Question", "name": v('faq-q1'), "acceptedAnswer": { "@type": "Answer", "text": v('faq-a1') } },
                    { "@type": "Question", "name": v('faq-q2'), "acceptedAnswer": { "@type": "Answer", "text": v('faq-a2') } }
                ];
            }

            const fullCode = `<title>${v('seo-title')}</title>
<meta name="description" content="${v('seo-desc')}">
<link rel="canonical" href="${v('seo-url')}">
<meta name="robots" content="${v('seo-robots')}">
<meta name="theme-color" content="${v('seo-theme')}">

<meta http-equiv="content-language" content="${v('seo-lang')}">

<meta property="og:title" content="${v('seo-title')}">
<meta property="og:description" content="${v('seo-desc')}">
<meta property="og:image" content="${v('seo-image')}">
<meta property="og:url" content="${v('seo-url')}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="${v('seo-twitter')}">

<script type="application/ld+json">
${JSON.stringify(schema, null, 2)}
<\/script>`;

            document.getElementById('output').textContent = fullCode;
            document.getElementById('result-container').style.display = 'block';
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('output').textContent);
            alert('Code copied! Paste it in the <head> of your HTML.');
        }
    </script>

</body>

</html>
