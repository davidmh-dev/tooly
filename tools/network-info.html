<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - Network Info</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #60a5fa;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .val {
            color: var(--accent);
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent); text-align:center;">Network & Browser Info</h1>
        <div id="info">
            <div class="row"><span>Screen Resolution</span> <span class="val" id="res"></span></div>
            <div class="row"><span>Language</span> <span class="val" id="lang"></span></div>
            <div class="row"><span>Platform</span> <span class="val" id="plat"></span></div>
            <div class="row"><span>User Agent</span> <span class="val" id="ua"
                    style="font-size:0.7rem; max-width:300px; text-align:right;"></span></div>
        </div>
    </div>
    <script>
        document.getElementById('res').innerText = `${screen.width}x${screen.height}`;
        document.getElementById('lang').innerText = navigator.language;
        document.getElementById('plat').innerText = navigator.platform;
        document.getElementById('ua').innerText = navigator.userAgent;
    </script>
</body>

</html>
