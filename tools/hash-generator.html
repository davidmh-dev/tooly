<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - Hash Generator</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #f472b6;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #000;
            color: #fff;
            border: 1px solid var(--border);
            padding: 10px;
            box-sizing: border-box;
            border-radius: 6px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .hash-out {
            margin-top: 20px;
            word-break: break-all;
            font-family: monospace;
            background: #000;
            padding: 15px;
            border-left: 4px solid var(--accent);
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent); text-align:center; margin-top: 0;">SHA-256 Hash Generator</h1>
        <label style="font-weight:bold; margin-bottom:5px; display:block;">Input Text</label>
        <textarea id="input" oninput="genHash()" placeholder="Type something to hash..."></textarea>
        <label style="font-weight:bold; margin-top:15px; display:block;">SHA-256 Output</label>
        <div class="hash-out" id="output">e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855</div>
    </div>
    <script>
        async function genHash() {
            const text = document.getElementById('input').value;
            if (!text) { document.getElementById('output').innerText = "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"; return; }
            const msgUint8 = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            document.getElementById('output').innerText = hashHex;
        }
    </script>
</body>

</html>
