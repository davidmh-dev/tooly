<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - Timezone Searcher</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --border: #334155;
            --hover: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-top: 0;
            color: var(--accent);
            font-size: 1.8rem;
        }

        .ui-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        label {
            font-size: 0.8rem;
            font-weight: bold;
            color: #94a3b8;
            text-transform: uppercase;
        }

        input {
            padding: 14px;
            background: #0f172a;
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        /* Estilos del Buscador Personalizado */
        .search-container {
            position: relative;
        }

        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid var(--accent);
            border-top: none;
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
            border-radius: 0 0 8px 8px;
            display: none;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.5);
        }

        .dropdown-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #334155;
            font-size: 0.95rem;
        }

        .dropdown-item:hover {
            background: var(--accent);
            color: #000;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .result-display {
            background: linear-gradient(180deg, #162033, #0f172a);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
        }

        #resTime {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            margin: 0;
            color: #fff;
        }

        #resDate {
            color: var(--accent);
            font-size: 1.2rem;
            margin-top: 15px;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .ui-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>World Time Converter</h1>

        <div class="ui-grid">
            <div class="group">
                <label>1. Local Reference</label>
                <input type="datetime-local" id="inputTime" oninput="update()">
            </div>

            <div class="group search-container">
                <label>2. Search Timezone</label>
                <input type="text" id="zoneSearch" placeholder="Type city (e.g. Mad...)" onfocus="showAll()"
                    oninput="filterZones()">
                <div id="dropdown" class="dropdown-list"></div>
            </div>
        </div>

        <div class="result-display">
            <p id="resTime">--:--</p>
            <div id="resDate">Select a time and zone</div>
        </div>
    </div>

    <script>
        let allZones = Intl.supportedValuesOf('timeZone');
        let selectedZone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        const inputTime = document.getElementById('inputTime');
        const zoneSearch = document.getElementById('zoneSearch');
        const dropdown = document.getElementById('dropdown');

        function init() {
            // Establecer hora local actual por defecto
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            inputTime.value = (new Date(now - offset)).toISOString().slice(0, 16);

            // Mostrar la zona actual en el buscador
            zoneSearch.value = selectedZone.replace(/_/g, ' ');

            update();
        }

        function filterZones() {
            const query = zoneSearch.value.toLowerCase();
            const filtered = allZones.filter(z => z.toLowerCase().includes(query.replace(/ /g, '_')));
            renderDropdown(filtered);
        }

        function showAll() {
            renderDropdown(allZones);
        }

        function renderDropdown(list) {
            dropdown.innerHTML = '';
            if (list.length === 0) {
                dropdown.style.display = 'none';
                return;
            }

            list.slice(0, 50).forEach(zone => { // Limitamos a 50 para rendimiento
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                item.textContent = zone.replace(/_/g, ' ');
                item.onclick = () => selectZone(zone);
                dropdown.appendChild(item);
            });
            dropdown.style.display = 'block';
        }

        function selectZone(zone) {
            selectedZone = zone;
            zoneSearch.value = zone.replace(/_/g, ' ');
            dropdown.style.display = 'none';
            update();
        }

        // Cerrar dropdown si se hace clic fuera
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                dropdown.style.display = 'none';
            }
        });

        function update() {
            if (!inputTime.value) return;
            const date = new Date(inputTime.value);

            document.getElementById('resTime').innerText = date.toLocaleTimeString('en-US', {
                timeZone: selectedZone,
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });

            document.getElementById('resDate').innerText = date.toLocaleDateString('en-US', {
                timeZone: selectedZone,
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }

        init();
    </script>
</body>

</html>
