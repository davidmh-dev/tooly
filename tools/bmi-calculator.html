<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - BMI Calculator</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #10b981;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1.1rem;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        #bmiValue {
            font-size: 3rem;
            font-weight: bold;
            margin: 0;
            color: var(--accent);
        }

        #bmiStatus {
            font-size: 1.2rem;
            margin-top: 5px;
            font-weight: bold;
        }

        .meter {
            height: 10px;
            width: 100%;
            background: #334155;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
            position: relative;
        }

        #pointer {
            height: 100%;
            width: 0%;
            transition: 0.5s;
            background: var(--accent);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent); margin-top:0;">BMI Calculator</h1>
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="e.g. 70" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="e.g. 175" oninput="calculate()">
        </div>

        <div class="result-box">
            <p id="bmiValue">0.0</p>
            <div id="bmiStatus">Enter your details</div>
            <div class="meter">
                <div id="pointer"></div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const w = parseFloat(document.getElementById('weight').value);
            const h = parseFloat(document.getElementById('height').value) / 100;

            if (w > 0 && h > 0) {
                const bmi = (w / (h * h)).toFixed(1);
                document.getElementById('bmiValue').innerText = bmi;

                let status = "";
                let color = "#10b981";
                let percent = 0;

                if (bmi < 18.5) { status = "Underweight"; color = "#38bdf8"; percent = 20; }
                else if (bmi < 25) { status = "Healthy Weight"; color = "#10b981"; percent = 50; }
                else if (bmi < 30) { status = "Overweight"; color = "#f59e0b"; percent = 75; }
                else { status = "Obesity"; color = "#ef4444"; percent = 100; }

                document.getElementById('bmiStatus').innerText = status;
                document.getElementById('bmiStatus').style.color = color;
                document.getElementById('pointer').style.backgroundColor = color;
                document.getElementById('pointer').style.width = percent + "%";
            }
        }
    </script>
</body>

</html>
