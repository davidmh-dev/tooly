<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooly - Ultimate Color Picker</title>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #6366f1;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            max-width: 600px;
            margin: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 5px;
            transition: color 0.2s;
        }

        p.subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        /* EyeDropper Button */
        .btn-eyedropper {
            width: 100%;
            padding: 15px;
            background: #3b82f6;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-eyedropper:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        #unsupported-msg {
            display: none;
            color: #fbbf24;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 20px;
            background: rgba(251, 191, 36, 0.1);
            padding: 12px;
            border-radius: 6px;
        }

        /* The Embedded Picker Container */
        .picker-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        /* Color Values Grid */
        .values-grid {
            display: grid;
            gap: 15px;
            width: 100%;
        }

        .value-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .value-row label {
            width: 50px;
            font-weight: bold;
            color: #cbd5e1;
            font-size: 0.9rem;
            text-align: right;
        }

        .value-row input {
            flex: 1;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .value-row input:focus {
            border-color: var(--accent);
        }

        .btn-copy {
            background: #334155;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            width: 90px;
            text-align: center;
        }

        .btn-copy:hover {
            background: #475569;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎨 Pro Color Picker</h1>
        <p class="subtitle">Pick from screen or use the interactive wheel</p>

        <div id="unsupported-msg">⚠️ Screen Dropper is not supported in this browser. You can still use the wheel below.
        </div>

        <button class="btn-eyedropper" id="btn-dropper" onclick="activateEyeDropper()">
            💉 Pick from Screen
        </button>

        <div class="picker-container">
            <div id="color-picker"></div>
        </div>

        <div class="values-grid">
            <div class="value-row">
                <label>HEX</label>
                <input type="text" id="val-hex" readonly>
                <button class="btn-copy" onclick="copyValue('val-hex', this)">Copy</button>
            </div>
            <div class="value-row">
                <label>RGB</label>
                <input type="text" id="val-rgb" readonly>
                <button class="btn-copy" onclick="copyValue('val-rgb', this)">Copy</button>
            </div>
            <div class="value-row">
                <label>HSL</label>
                <input type="text" id="val-hsl" readonly>
                <button class="btn-copy" onclick="copyValue('val-hsl', this)">Copy</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Initialize the iro.js color picker (The Wheel)
        var colorPicker = new iro.ColorPicker("#color-picker", {
            width: 260,
            color: "#3b82f6",
            borderWidth: 2,
            borderColor: "#334155",
            layout: [
                { component: iro.ui.Wheel },
                { component: iro.ui.Slider, options: { sliderType: 'value' } },
                { component: iro.ui.Slider, options: { sliderType: 'alpha' } }
            ]
        });

        // DOM Elements
        const hexInput = document.getElementById('val-hex');
        const rgbInput = document.getElementById('val-rgb');
        const hslInput = document.getElementById('val-hsl');

        // 2. Automatically update inputs whenever the wheel moves
        colorPicker.on('color:change', function (color) {
            const hasAlpha = color.alpha < 1;

            hexInput.value = (hasAlpha ? color.hex8String : color.hexString).toUpperCase();
            rgbInput.value = hasAlpha ? color.rgbaString : color.rgbString;
            hslInput.value = hasAlpha ? color.hslaString : color.hslString;

            // Match the page title color to the selected color for a nice UI effect
            document.documentElement.style.setProperty('--accent', color.hexString);
        });

        // Trigger initial values on load
        colorPicker.emit('color:change', colorPicker.color);

        // 3. Setup the Native Screen Dropper API
        if (!window.EyeDropper) {
            document.getElementById('unsupported-msg').style.display = 'block';
            document.getElementById('btn-dropper').style.display = 'none';
        }

        async function activateEyeDropper() {
            if (!window.EyeDropper) return;

            const eyeDropper = new EyeDropper();
            try {
                const result = await eyeDropper.open();
                // This is the magic connection: 
                // We feed the dropper's hex color into the wheel.
                // The wheel then triggers the 'color:change' event automatically!
                colorPicker.color.hexString = result.sRGBHex;
            } catch (e) {
                console.log("EyeDropper canceled or failed: ", e);
            }
        }

        // 4. Copy to Clipboard functionality
        function copyValue(elementId, btnElement) {
            const inputElement = document.getElementById(elementId);
            inputElement.select();
            navigator.clipboard.writeText(inputElement.value).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = "Copied!";
                btnElement.style.background = "#10b981"; // Success green

                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.background = "#334155"; // Revert to dark gray
                }, 1500);
            });
        }
    </script>

</body>

</html>
