<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooly - Base64 Encoder/Decoder</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #ec4899;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--accent);
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 6px;
            padding: 15px;
            font-family: monospace;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-enc {
            background: var(--accent);
            color: white;
        }

        .btn-dec {
            background: #334155;
            color: white;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="margin-top:0;">Base64 Converter</h1>
        <p style="text-align:center; color:#94a3b8; font-size:0.9rem;">Secure offline encoding and decoding for your
            strings</p>
        <label style="display:block; margin-bottom:5px; font-weight:bold;">Raw / Decoded Text</label>
        <textarea id="raw" placeholder="Enter plain text here..."></textarea>
        <div class="btns">
            <button class="btn-enc" onclick="encode()">Encode ➔</button>
            <button class="btn-dec" onclick="decode()"> ⬅ Decode</button>
        </div>
        <label style="display:block; margin-bottom:5px; font-weight:bold;">Base64 Encoded Output</label>
        <textarea id="base64" placeholder="Enter Base64 string here..."></textarea>
    </div>
    <script>
        function encode() {
            try {
                const raw = document.getElementById('raw').value;
                document.getElementById('base64').value = btoa(unescape(encodeURIComponent(raw)));
            } catch (e) { alert("Error encoding text."); }
        }
        function decode() {
            try {
                const b64 = document.getElementById('base64').value;
                document.getElementById('raw').value = decodeURIComponent(escape(atob(b64)));
            } catch (e) { alert("Invalid Base64 string."); }
        }
    </script>
</body>

</html>
