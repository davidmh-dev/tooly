<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - QR Code Generator</title>
    <!-- Cargamos la librería desde un CDN para facilitar la integración -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #10b981;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #000;
            color: #fff;
            border: 1px solid var(--border);
            padding: 15px;
            box-sizing: border-box;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        #qrcode {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 8px;
            margin: 20px 0;
            min-height: 128px;
        }

        #qrcode img {
            margin: 0 auto;
        }

        .btn-download {
            display: block;
            width: 200px;
            margin: 20px auto 0;
            padding: 12px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-download:hover {
            opacity: 0.9;
        }

        .hint {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent); margin-top: 0;">QR Code Generator</h1>
        <p class="hint">Enter a URL, text, or contact info to generate your QR code instantly.</p>

        <textarea id="text" oninput="generateQR()" placeholder="https://tooly.dev"></textarea>

        <div id="qrcode"></div>

        <button class="btn-download" onclick="downloadQR()">Download PNG</button>
    </div>

    <script>
        // Inicializamos el objeto QR
        const qrContainer = document.getElementById("qrcode");
        const qrcode = new QRCode(qrContainer, {
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function generateQR() {
            const text = document.getElementById("text").value;
            if (!text) {
                qrContainer.style.opacity = "0.3";
                return;
            }
            qrContainer.style.opacity = "1";
            qrcode.clear();
            qrcode.makeCode(text);
        }

        function downloadQR() {
            const img = qrContainer.querySelector("img");
            if (!img) return;
            const link = document.createElement("a");
            link.href = img.src;
            link.download = "tooly-qr-code.png";
            link.click();
        }

        // Generar uno por defecto
        generateQR();
    </script>
</body>

</html>
