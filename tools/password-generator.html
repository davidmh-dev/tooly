<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooly - Bulk Password Generator</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #10b981;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--accent);
            text-align: center;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .controls {
            background: #0f172a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        input[type="number"] {
            width: 80px;
            padding: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: #000;
            border: 1px solid var(--border);
            color: var(--accent);
            border-radius: 6px;
            padding: 15px;
            font-family: monospace;
            resize: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #000;
            border: none;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔑 Bulk Password Generator</h1>
        <p class="subtitle">Secure, offline, mass password and token generation</p>
        <div class="grid">
            <div class="controls">
                <label>Length <input type="number" id="len" value="16" min="4" max="128"></label>
                <label>Quantity <input type="number" id="qty" value="10" min="1" max="1000"></label>
                <hr style="border-color: var(--border); margin: 15px 0;">
                <label>Uppercase (A-Z) <input type="checkbox" id="up" checked></label>
                <label>Lowercase (a-z) <input type="checkbox" id="low" checked></label>
                <label>Numbers (0-9) <input type="checkbox" id="num" checked></label>
                <label>Symbols (!@#$) <input type="checkbox" id="sym" checked></label>
                <button onclick="generate()">Generate</button>
            </div>
            <div>
                <textarea id="output" readonly placeholder="Your passwords will appear here..."></textarea>
                <button onclick="copyPasswords()" style="background: #334155; color: white;">Copy All</button>
            </div>
        </div>
    </div>
    <script>
        function generate() {
            const len = document.getElementById('len').value;
            const qty = document.getElementById('qty').value;
            const chars = {
                up: "ABCDEFGHIJKLMNOPQRSTUVWXYZ", low: "abcdefghijklmnopqrstuvwxyz",
                num: "0123456789", sym: "!@#$%^&*()_+~`|}{[]:;?><,./-="
            };
            let pool = "";
            if (document.getElementById('up').checked) pool += chars.up;
            if (document.getElementById('low').checked) pool += chars.low;
            if (document.getElementById('num').checked) pool += chars.num;
            if (document.getElementById('sym').checked) pool += chars.sym;

            if (!pool) { alert("Select at least one character type."); return; }

            let result = "";
            for (let i = 0; i < qty; i++) {
                let pass = "";
                for (let j = 0; j < len; j++) pass += pool.charAt(Math.floor(Math.random() * pool.length));
                result += pass + "\n";
            }
            document.getElementById('output').value = result;
        }
        function copyPasswords() { navigator.clipboard.writeText(document.getElementById('output').value); }
    </script>
</body>

</html>
