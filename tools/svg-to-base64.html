<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - SVG to Base64</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #818cf8;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #000;
            color: #fff;
            border: 1px solid var(--border);
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 20px;
            border-radius: 6px;
            font-family: monospace;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent); text-align:center; margin-top: 0;">SVG to Base64 Converter</h1>
        <label style="font-weight:bold; margin-bottom:5px; display:block;">Paste SVG Code</label>
        <textarea id="svg" oninput="convert()"
            placeholder="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'>...</svg>"></textarea>
        <label style="font-weight:bold; margin-bottom:5px; display:block;">Base64 Data URI</label>
        <textarea id="out" readonly placeholder="data:image/svg+xml;base64,..."></textarea>
    </div>
    <script>
        function convert() {
            const svg = document.getElementById('svg').value;
            if (!svg) { document.getElementById('out').value = ""; return; }
            try {
                const b64 = btoa(unescape(encodeURIComponent(svg)));
                document.getElementById('out').value = `data:image/svg+xml;base64,${b64}`;
            } catch (e) {
                document.getElementById('out').value = "Invalid SVG content.";
            }
        }
    </script>
</body>

</html>
