<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - Diff Checker</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #4ade80;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #000;
            color: #fff;
            border: 1px solid var(--border);
            padding: 10px;
            box-sizing: border-box;
            border-radius: 6px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .diff-view {
            margin-top: 20px;
            background: #000;
            padding: 15px;
            font-family: monospace;
            border-radius: 6px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
        }

        .del {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .ins {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent); text-align:center; margin-top: 0;">Text Diff Checker</h1>
        <div class="grid">
            <div><label style="font-weight:bold;">Original Text</label><textarea id="t1"
                    oninput="check()">Hello world</textarea></div>
            <div><label style="font-weight:bold;">Modified Text</label><textarea id="t2"
                    oninput="check()">Hello new world</textarea></div>
        </div>
        <label style="font-weight:bold; margin-top: 20px; display:block;">Line-by-line Difference</label>
        <div class="diff-view" id="diff">Differences will appear here...</div>
    </div>
    <script>
        function check() {
            const a = document.getElementById('t1').value.split('\n');
            const b = document.getElementById('t2').value.split('\n');
            let out = '';
            const max = Math.max(a.length, b.length);
            for (let i = 0; i < max; i++) {
                if (a[i] !== b[i]) {
                    if (a[i] !== undefined) out += `<div class="del">- ${a[i]}</div>`;
                    if (b[i] !== undefined) out += `<div class="ins">+ ${b[i]}</div>`;
                } else {
                    out += `<div>&nbsp; ${a[i] || ''}</div>`;
                }
            }
            document.getElementById('diff').innerHTML = out;
        }
        check();
    </script>
</body>

</html>
