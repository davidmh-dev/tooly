<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tooly - URL Parser</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --border: #334155;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        textarea {
            width: 100%;
            height: 80px;
            background: #000;
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 15px;
            box-sizing: border-box;
            border-radius: 6px;
            font-family: monospace;
            outline: none;
            margin-bottom: 20px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .label {
            font-weight: bold;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 4px;
        }

        .value {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            word-break: break-all;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border: 1px solid var(--border);
        }

        th {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="color:var(--accent); text-align:center; margin-top: 0;">URL Parser & Debugger</h1>
        <label style="font-weight:bold; margin-bottom: 10px; display:block;">Paste URL to Inspect</label>
        <textarea id="urlInput" oninput="parseURL()"
            placeholder="https://example.com/path?name=tooly&version=2.0#section"></textarea>

        <div id="results" style="display:none;">
            <div class="result-grid">
                <div class="label">Protocol</div>
                <div class="value" id="proto">-</div>
                <div class="label">Hostname</div>
                <div class="value" id="host">-</div>
                <div class="label">Path</div>
                <div class="value" id="path">-</div>
                <div class="label">Hash</div>
                <div class="value" id="hash">-</div>
            </div>

            <h3 style="margin-top:30px; color:var(--accent);">Query Parameters</h3>
            <table id="paramsTable">
                <thead>
                    <tr>
                        <th>Key</th>
                        <th>Value (Decoded)</th>
                    </tr>
                </thead>
                <tbody id="paramsBody"></tbody>
            </table>
        </div>
    </div>
    <script>
        function parseURL() {
            const input = document.getElementById('urlInput').value.trim();
            const results = document.getElementById('results');
            if (!input) { results.style.display = 'none'; return; }

            try {
                const url = new URL(input);
                results.style.display = 'block';
                document.getElementById('proto').innerText = url.protocol;
                document.getElementById('host').innerText = url.hostname;
                document.getElementById('path').innerText = url.pathname;
                document.getElementById('hash').innerText = url.hash || '(none)';

                const tbody = document.getElementById('paramsBody');
                tbody.innerHTML = '';
                url.searchParams.forEach((value, key) => {
                    tbody.innerHTML += `<tr><td><strong>${key}</strong></td><td>${value}</td></tr>`;
                });
                if (tbody.innerHTML === '') tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#94a3b8;">No parameters found</td></tr>';
            } catch (e) { results.style.display = 'none'; }
        }
    </script>
</body>

</html>
